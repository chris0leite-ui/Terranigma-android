name: Build Android APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:          # lets you trigger a build manually from GitHub

jobs:
  test:
    name: Unit tests (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run unit tests
        run: ./gradlew :core:test
        # BUILD_ANDROID is intentionally NOT set here so :app is excluded
        # and the test job stays fast and SDK-free.

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: core/build/reports/tests/test/

  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    needs: test               # only build if tests pass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-android-

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
        env:
          BUILD_ANDROID: "true"   # triggers include(":app") in settings.gradle.kts

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: terranigma-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
