name: CI

on:
  push:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew :core:test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
        env:
          BUILD_ANDROID: true
      - uses: actions/upload-artifact@v4
        with:
          name: terranigma-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
